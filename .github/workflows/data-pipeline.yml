name: Daily Hidden Gems Data

on:
  schedule:
    - cron: "20 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hidden-gems-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/data-pipeline/requirements.txt

      - name: Generate Hidden Gems JSON
        env:
          YFINANCE_SLEEP_SECONDS: "1.25"
          HIDDEN_GEMS_MIN_SUCCESS_RATIO: "0.35"
        run: python scripts/data-pipeline/generate_hidden_gems.py

      - name: Validate generated JSON
        run: python -m json.tool public/data/hidden-gems.json > /dev/null

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/hidden-gems.json; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/hidden-gems.json
          git commit -m "data: refresh hidden gems"
          git push
